version: 2

models:
  - name: dim_properties
    description: >
      Dimension table for all real estate properties. Enriched with property type,
      location, energy ratings, condition labels, and calculated pricing metrics.
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1
            max_value: 1000000
      - dbt_utils.expression_is_true:
          arguments:
            expression: "listing_price >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "size_sqm > 0"
    columns:
      - name: property_id
        description: Unique identifier for each property.
        tests:
          - not_null
          - unique
      - name: address
        description: Street address of the property.
        tests:
          - not_null
      - name: size_sqm
        description: Total size of the property in square metres.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 100000
      - name: listing_price
        description: Listed price of the property rounded to 2 decimal places.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: is_available
        description: Flag indicating if the property is currently available (1=Yes, 0=No).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: is_residential
        description: Flag indicating if the property is residential (1) or commercial (0).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: condition_status
        description: Raw condition status of the property from source.
      - name: condition_label
        description: Human-readable condition label from the property_condition_labels seed.
      - name: condition_rank
        description: Rank of property condition from 1 (best) to 5 (worst).
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5
      - name: energy_class
        description: Energy efficiency class rating (A to G).
      - name: energy_label
        description: Human-readable energy label from the energy_class_ratings seed.
      - name: efficiency_rank
        description: Rank of energy efficiency from 1 (most efficient) to 7 (least).
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 7
      - name: type_name
        description: Name of the property type (e.g. Apartment, Villa, Office).
        tests:
          - not_null
      - name: city_name
        description: Name of the city where the property is located.
        tests:
          - not_null
      - name: region_name
        description: Name of the region where the property is located.
        tests:
          - not_null
      - name: price_per_sqm
        description: Listing price divided by size in square metres.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: property_age
        description: Age of the property in years calculated from build_year.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 200
      - name: amenity_count
        description: Total count of amenities — parking, garden, balcony (max 3).
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 3
      - name: size_category
        description: Categorised size band — Small, Medium, Large, or Extra Large.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Small', 'Medium', 'Large', 'Extra Large']
      - name: price_vs_market
        description: Difference between listing price and estimated market price.
