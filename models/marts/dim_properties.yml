version: 2

models:
  - name: dim_properties
    columns:
      - name: property_id
        tests:
          - not_null
          - unique
      - name: address
        tests:
          - not_null
      - name: listing_price
        tests:
          - not_null
      - name: is_available
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: is_residential
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: size_category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Small', 'Medium', 'Large', 'Extra Large']
      - name: type_name
        tests:
          - not_null
      - name: city_name
        tests:
          - not_null
      - name: region_name
        tests:
          - not_null
