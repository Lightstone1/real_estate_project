version: 2

models:
  - name: int_location_enriched
    columns:
      - name: city_id
        tests:
          - not_null
          - unique
      - name: city_name
        tests:
          - not_null
      - name: region_id
        tests:
          - not_null
      - name: region_name
        tests:
          - not_null
      - name: is_major_city
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
