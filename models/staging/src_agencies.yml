version: 2

sources:
  - name: real_estate
    database: real_estate_raw_db
    schema: real_estate
    tables:
      - name: AGENCIES
        columns:
          - name: AGENCY_ID
            tests:
              - not_null
              - unique
          - name: AGENCY_NAME
            tests:
              - not_null
          - name: LICENSE_NUMBER
            tests:
              - not_null
              - unique
          - name: CITY_ID
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('real_estate', 'CITIES')
                    field: CITY_ID
          - name: EMAIL
            tests:
              - not_null
          - name: IS_ACTIVE
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: [0, 1]
