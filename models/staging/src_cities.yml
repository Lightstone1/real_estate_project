version: 2

sources:
  - name: real_estate
    database: real_estate_raw_db
    schema: real_estate
    tables:
      - name: CITIES
        columns:
          - name: CITY_ID
            tests:
              - not_null
              - unique
          - name: REGION_ID
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('real_estate', 'REGIONS')
                    field: REGION_ID
          - name: CITY_NAME
            tests:
              - not_null
          - name: IS_MAJOR_CITY
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: [0, 1]
