version: 2

sources:
  - name: real_estate
    database: real_estate_raw_db
    schema: real_estate
    tables:
      - name: PROPERTY_TYPES
        columns:
          - name: TYPE_ID
            tests:
              - not_null
              - unique
          - name: TYPE_CODE
            tests:
              - not_null
              - unique
          - name: TYPE_NAME
            tests:
              - not_null
          - name: IS_RESIDENTIAL
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: [0, 1]
